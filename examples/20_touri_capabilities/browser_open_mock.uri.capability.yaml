version: 1

capability:
  id: browser.open.page
  scheme: browser
  uri_template: browser://touri/mock/page/open
  operation: open
  kind: command
  description: Open browser page via uri2ops mock adapter.

input:
  params:
    url:
      type: string

backend:
  type: uri2ops
  operation: open
  adapter: mock

policy:
  side_effects: true
  requires_approval: false
  redact_secrets: true
